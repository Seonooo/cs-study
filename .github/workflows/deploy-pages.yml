name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/html/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# Pages 배포에 필요한 최소 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 한 번만 배포 (진행 중 배포는 취소하지 않음)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # docs/html 을 사이트 루트로 업로드
      # → 배포 후 https://{owner}.github.io/{repo}/index.html
      #   주차별:  https://{owner}.github.io/{repo}/weeks/week-NN.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
